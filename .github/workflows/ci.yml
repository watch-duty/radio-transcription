name: Radio Transcription CI

on: [push, workflow_call]

permissions:
  contents: read
  actions: read

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Check if workflow already passed for this commit
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: context.sha,
              status: 'completed',
              conclusion: 'success'
            });
            const alreadyPassed = runs.data.workflow_runs.length > 0;
            core.setOutput('should_run', alreadyPassed ? 'false' : 'true');
            if (alreadyPassed) {
              core.notice('Workflow already passed for this commit, skipping all jobs');
            }
      - name: Validate merge with main (fail fast on conflicts)
        if: steps.check.outputs.should_run == 'true'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git fetch origin main
          git merge origin/main --no-edit || (echo "Merge conflicts detected. Please resolve conflicts." && exit 1)

  code-quality-checks-python:
    needs: [setup]
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Install mise, install tools
        # mise installs uv and other project-specific tools. see: .tool-versions
        uses: jdx/mise-action@v3
      - name: Install dependencies
        run: uv sync
      - name: Generate Protobuf Python files
        run: mise run generate:protos
      - name: Ruff check
        run: uv run ruff check
      - name: Ruff format check
        run: uv run ruff format --check
      - name: Type check
        run: uv run ty check

  terraform-checks:
    needs: [setup]
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Install mise, install tools
        uses: jdx/mise-action@v3
      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/
      - name: Terraform validate
        working-directory: terraform/modules/alloydb
        run: |
          terraform init -backend=false
          terraform validate

  run-tests:
    needs: [setup]
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Install mise, install tools
        # mise installs uv and other project-specific tools. see: .tool-versions
        uses: jdx/mise-action@v3
      - name: Install dependencies
        run: uv sync
      - name: Generate Protobuf Python files
        run: mise run generate:protos
      - name: Run tests
        run: uv run python -m unittest -b

  # Builds each service's Dockerfile and verifies the entrypoint module can be
  # imported. This catches missing dependencies in per-service requirements.txt
  # files that unit tests miss (unit tests install from pyproject.toml which has
  # all dependencies).
  docker-smoke-test:
    needs: [setup]
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: evaluation
            dockerfile: backend/pipeline/evaluation/Dockerfile
            import: backend.pipeline.evaluation.evaluation_core
          - service: notification
            dockerfile: backend/pipeline/notification/Dockerfile
            import: backend.pipeline.notification.send_notification
          - service: transcription
            dockerfile: backend/pipeline/transcription/Dockerfile
            import: backend.pipeline.transcription.main
          - service: ingestion
            dockerfile: backend/pipeline/ingestion/collectors/Dockerfile
            import: backend.pipeline.ingestion.collectors.icecast_collector
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ${{ matrix.service }}-smoke-test -f ${{ matrix.dockerfile }} .
      - name: Verify entrypoint imports
        run: docker run --rm ${{ matrix.service }}-smoke-test python -c "import ${{ matrix.import }}"
