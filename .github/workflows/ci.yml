name: Radio Transcription CI

on: [push, workflow_call]

permissions:
  contents: read
  actions: read

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Check if workflow already passed for this commit
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: context.sha,
              status: 'completed',
              conclusion: 'success'
            });
            const alreadyPassed = runs.data.workflow_runs.length > 0;
            core.setOutput('should_run', alreadyPassed ? 'false' : 'true');
            if (alreadyPassed) {
              core.notice('Workflow already passed for this commit, skipping all jobs');
            }
      - name: Validate merge with main (fail fast on conflicts)
        if: steps.check.outputs.should_run == 'true'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git fetch origin main
          git merge origin/main --no-edit || (echo "Merge conflicts detected. Please resolve conflicts." && exit 1)

  code-quality-checks-python:
    needs: [setup]
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Install mise, install tools
        # mise installs uv and other project-specific tools. see: .tool-versions
        uses: jdx/mise-action@v3
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check
      - name: Ruff format check
        run: uv run ruff format --check
      - name: Type check
        run: uv run ty check

  generate-proto-types:
    needs: [setup]
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Install mise, install tools
        # mise installs uv and other project-specific tools. see: .tool-versions
        uses: jdx/mise-action@v3
      - name: Install dependencies
        run: uv sync
      - name: Generate Protobuf Python files
        run: protoc --proto_path=protos --pyi_out=backend/pipeline/schema_types --python_out=backend/pipeline/schema_types protos/*.proto
      - name: Check for differences
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Protobuf files are out of sync!"
            echo "Please run 'protoc' locally and commit the updated Python files."
            git diff
            exit 1
          else
            echo "Protobuf files are in sync."
          fi
