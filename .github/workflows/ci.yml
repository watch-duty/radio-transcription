name: Radio Transcription CI

on: [push, workflow_call]

permissions:
  contents: read
  actions: read
  packages: read

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Check if workflow already passed for this commit
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              head_sha: context.sha,
              status: 'completed',
              conclusion: 'success'
            });
            const alreadyPassed = runs.data.workflow_runs.length > 0;
            core.setOutput('should_run', alreadyPassed ? 'false' : 'true');
            if (alreadyPassed) {
              core.notice('Workflow already passed for this commit, skipping all jobs');
            }
      - name: Validate merge with main (fail fast on conflicts)
        if: steps.check.outputs.should_run == 'true'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git fetch origin main
          git merge origin/main --no-edit || (echo "Merge conflicts detected. Please resolve conflicts." && exit 1)

  code-quality-checks-python:
    needs: [setup]
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Install mise, install tools
        # mise installs uv and other project-specific tools. see: .tool-versions
        uses: jdx/mise-action@v3
      - name: Install dependencies
        run: uv sync
      - name: Generate Protobuf Python files
        run: mise run generate:protos
      - name: Ruff check
        run: uv run ruff check
      - name: Ruff format check
        run: uv run ruff format --check
      - name: Verify ruff ignore lists are sorted
        run: |
          python -c "
          import tomllib, sys
          with open('pyproject.toml', 'rb') as f:
              cfg = tomllib.load(f)
          errors = []
          # Check global ignore list
          codes = [c for c in cfg['tool']['ruff']['lint']['ignore'] if not c.startswith('#')]
          if codes != sorted(codes):
              errors.append('tool.ruff.lint.ignore is not sorted')
          # Check per-file ignore lists
          for pattern, codes in cfg['tool']['ruff']['lint'].get('per-file-ignores', {}).items():
              filtered = [c for c in codes if not c.startswith('#')]
              if filtered != sorted(filtered):
                  errors.append(f'per-file-ignores[{pattern!r}] is not sorted')
          if errors:
              print('\n'.join(errors), file=sys.stderr)
              sys.exit(1)
          print('All ruff ignore lists are sorted')
          "
      - name: Type check
        run: uv run ty check

  terraform-checks:
    needs: [setup]
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Install mise, install tools
        uses: jdx/mise-action@v3
      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/
      - name: Terraform validate
        working-directory: terraform/modules/alloydb
        run: |
          terraform init -backend=false
          terraform validate

  run-tests:
    needs: [setup]
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100
      - name: Install system dependencies (ffmpeg for pydub, libomp5 for TenVAD)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libomp5 libc++1 libc++abi1
      - name: Install mise, install tools
        # mise installs uv and other project-specific tools. see: .tool-versions
        uses: jdx/mise-action@v3
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Install dependencies
        run: uv sync
      - name: Generate Protobuf Python files
        run: mise run generate:protos
      - name: Run tests
        run: uv run python -m unittest -b

  # Builds each service's Dockerfile and verifies all transitive imports resolve
  # and required environment variables are documented. This catches:
  #   1. Missing dependencies in per-service requirements.txt (unit tests install
  #      from pyproject.toml which has all deps, masking per-service gaps).
  #   2. New required env vars added via _require_env() but not yet wired into
  #      the deployment Terraform — the settings instantiation step fails if any
  #      required var is missing from the explicit -e list below.
  # NOTE: evaluation/notification are excluded because their
  # Dockerfiles don't generate protobuf files yet. Add them here once their
  # Dockerfiles include protobuf generation.
  docker-smoke-test:
    needs: [setup]
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build ingestion Docker image
        run: docker build -t ingestion-smoke-test -f backend/pipeline/ingestion/collectors/Dockerfile .
      - name: Build transcription Docker image
        run: docker build -t transcription-smoke-test -f backend/pipeline/transcription/Dockerfile .
      # PUBSUB_EMULATOR_HOST bypasses GCP credential resolution in the
      # module-level PublisherClient() instantiation in normalizer_runtime.py.
      # Without it, the Pub/Sub SDK attempts ADC which fails inside Docker.
      - name: Verify ingestion imports
        run: |
          docker run --rm \
            -e BROADCASTIFY_USERNAME=smoke-test \
            -e BROADCASTIFY_PASSWORD=smoke-test \
            -e PUBSUB_EMULATOR_HOST=localhost:8085 \
            ingestion-smoke-test \
            python -c "import backend.pipeline.ingestion.collectors.icecast_collector"
      - name: Verify ingestion settings instantiation
        run: |
          docker run --rm \
            -e BROADCASTIFY_USERNAME=smoke-test \
            -e BROADCASTIFY_PASSWORD=smoke-test \
            -e PUBSUB_EMULATOR_HOST=localhost:8085 \
            -e AUDIO_STAGING_BUCKET=smoke-test-bucket \
            -e PUBSUB_TOPIC_PATH=projects/test/topics/test \
            -e ALLOYDB_HOST=localhost \
            -e ALLOYDB_USER=worker \
            -e ALLOYDB_DB=postgres \
            ingestion-smoke-test \
            python -c "from backend.pipeline.ingestion.settings import NormalizerSettings; NormalizerSettings()"
      - name: Build detection Docker image
        run: docker build -t detection-smoke-test -f backend/pipeline/detection/Dockerfile .
      # DETECTOR_CONFIG with spectral_flatness exercises scipy spectral
      # analysis init. Without it, the default empty config skips detector init.
      - name: Verify detection imports and detector initialization
        run: |
          docker run --rm \
            -e LOCAL_DEV=1 \
            -e PUBSUB_EMULATOR_HOST=localhost:8085 \
            -e 'DETECTOR_CONFIG={"detectors": [{"type": "spectral_flatness"}]}' \
            detection-smoke-test \
            python -c "from backend.pipeline.detection import normalization_handler"
      - name: Smoke-test detection handler accepts CloudEvents
        run: |
          # Start functions-framework in the background
          docker run -d --name detection-smoke \
            -p 8080:8080 \
            -e LOCAL_DEV=1 \
            -e PUBSUB_EMULATOR_HOST=localhost:8085 \
            -e 'DETECTOR_CONFIG={"detectors": [{"type": "spectral_flatness"}]}' \
            detection-smoke-test

          # Wait for the server to be ready (max 30s)
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "" http://localhost:8080/ 2>/dev/null; then
              break
            fi
            sleep 1
          done

          if ! curl -s -o /dev/null -w "" http://localhost:8080/ 2>/dev/null; then
            echo "FAIL: detection-smoke container never became ready (30s timeout)"
            docker logs detection-smoke
            docker stop detection-smoke && docker rm detection-smoke
            exit 1
          fi

          # Test 1: CloudEvents POST should return 200
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/ \
            -H "Content-Type: application/json" \
            -H "ce-id: smoke-test-1" \
            -H "ce-type: google.cloud.pubsub.topic.v1.messagePublished" \
            -H "ce-source: //pubsub.googleapis.com/projects/test/topics/test" \
            -H "ce-specversion: 1.0" \
            -d '{"message": {"data": "", "messageId": "smoke-test"}}')

          if [ "$HTTP_CODE" != "200" ]; then
            docker stop detection-smoke && docker rm detection-smoke
            echo "FAIL: CloudEvents POST expected HTTP 200 but got $HTTP_CODE"
            echo "This means functions-framework cannot parse CloudEvents requests."
            exit 1
          fi
          echo "PASS: CloudEvents POST accepted (HTTP $HTTP_CODE)"

          # Test 2: Raw Pub/Sub JSON (no ce-* headers) should return 400
          # This is the exact format a Pub/Sub push subscription sends.
          # The async functions-framework does NOT convert this to CloudEvents.
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/ \
            -H "Content-Type: application/json" \
            -d '{"message": {"data": "", "messageId": "smoke-test"}, "subscription": "projects/test/subscriptions/test"}')

          # Clean up
          docker stop detection-smoke && docker rm detection-smoke

          if [ "$HTTP_CODE" != "400" ]; then
            echo "FAIL: Raw Pub/Sub POST expected HTTP 400 but got $HTTP_CODE"
            echo "If this returns 200, the handler may accept raw Pub/Sub format now"
            echo "(e.g. switched to sync @cloud_event). Update this test accordingly."
            exit 1
          fi
          echo "PASS: Raw Pub/Sub POST correctly rejected (HTTP $HTTP_CODE)"
