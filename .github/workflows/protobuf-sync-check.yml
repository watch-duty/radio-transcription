name: Protobuf Sync Check

on:
  pull_request:
    paths:
      - '**.proto'
      - '**pb2.py'
      - '**pb2.pyi'

jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Generate Protobuf Python files
        run: |
          protoc --proto_path=protos --pyi_out=backend/pipeline/schema_types --python_out=backend/pipeline/schema_types protos/*.proto

      - name: Check for differences
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Protobuf files are out of sync!"
            echo "Please run 'protoc' locally and commit the updated Python files."
            git diff
            exit 1
          else
            echo "Protobuf files are in sync."
          fi
