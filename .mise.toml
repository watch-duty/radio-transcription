[settings]
# Automatically use uv virtual environment if available
python.uv_venv_auto = true

[env]
_.file = ".env"

# Set PYTHONPATH to repository root for easier imports
PYTHONPATH = "."

[vars]
backend_dir = "backend"
frontend_dir = "frontend"

# ---------------------------------------------------------------------------- #
#                              Code Quality Tasks                              #
# ---------------------------------------------------------------------------- #

[tasks.lint]
depends = ["lint:ruff", "lint:ty", "lint:terraform"]

[tasks."lint:ruff"]
description = "Run ruff Python linter with auto-fix"
run = "uv run ruff check --fix"

[tasks."lint:ty"]
description = "Run ty Python type-checker"
run = "uv run ty check"

[tasks."lint:terraform"]
description = "Validate Terraform code and check formatting for pre-submits"
run = """
terraform validate
terraform fmt -check -recursive
"""

[tasks.format]
depends = ["format:ruff", "format:terraform"]

[tasks."format:ruff"]
description = "Format Python code with ruff"
run = "uv run ruff format"

[tasks."format:terraform"]
description = "Format Terraform code"
run = "terraform fmt -recursive"

[tasks."generate:protos"]
description = "Generate Python code from Protobuf definitions"
run = "uv run python -m grpc_tools.protoc --proto_path=protos --python_out=backend/pipeline/schema_types --grpc_python_out=backend/pipeline/schema_types --pyi_out=backend/pipeline/schema_types protos/*.proto"

[tasks.test]
description = "Run all unit tests"
run = "uv run python -m unittest discover backend/pipeline"

[tasks."test:rules-storage"]
description = "Run RulesStore integration tests"
run = "uv run python -m unittest backend/pipeline/storage/tests/test_rules_store_integration.py"

[tasks."test:feeds-storage"]
description = "Run FeedStore integration tests"
run = "uv run python -m unittest backend/pipeline/storage/tests/test_feed_store_integration.py"
