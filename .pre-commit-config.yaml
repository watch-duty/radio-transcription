repos:
  - repo: local
    hooks:
      - id: generate-protos
        name: generate protobufs
        entry: mise run generate:protos
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ty-check
        name: ty type checker
        entry: uv run ty check
        language: system
        types_or: [python, pyi]
        require_serial: true
        pass_filenames: false
