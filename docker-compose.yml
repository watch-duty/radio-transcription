version: '3.8'
services:
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"
    networks:
      - pipeline-network

  pubsub-init:
    image: python:3.11-slim
    depends_on:
      - pubsub-emulator
      - evaluation
      - notification
    networks:
      - pipeline-network
    volumes:
      - ./infra/local/pubsub_init.py:/app/pubsub_init.py
    working_dir: /app
    command: sh -c "pip install requests && python pubsub_init.py"

  evaluation:
    build:
      context: .
      dockerfile: backend/pipeline/evaluation/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - GOOGLE_CLOUD_PROJECT=local-project
      - OUTPUT_TOPIC=evaluation-output-topic
      - LOCAL_DEV=true
    networks:
      - pipeline-network
    depends_on:
      - pubsub-emulator

  notification:
    build:
      context: .
      dockerfile: backend/pipeline/notification/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - NOTIFICATION_ENDPOINT=https://httpbin.org/post
      - NOTIFICATION_ENDPOINT_API_KEY=mock
      - LOCAL_DEV=true
    command: ["functions-framework", "--source=backend/pipeline/notification/send_notification.py", "--target=send_notification", "--signature-type=cloudevent", "--port=8081"]
    networks:
      - pipeline-network
    depends_on:
      - pubsub-emulator

networks:
  pipeline-network:
