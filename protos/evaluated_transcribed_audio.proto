syntax = "proto3";
import "google/protobuf/timestamp.proto";

// Identifiers, timestamps, transcript, and evaluation decisions for transcribed audio.
message EvaluatedTranscribedAudio {

  // Unique ID to the feed.
  string feed_id = 1;
  // Unique ID for the generated transmission.
  string transmission_id = 2;
  // List of unique IDs for the audio segments that make up this transmission.
  repeated string source_chunk_ids = 3;
  // Start timestamp of the audio.
  google.protobuf.Timestamp start_timestamp = 4;
  // End timestamp of the audio.
  google.protobuf.Timestamp end_timestamp = 5;
  // Full transcript text evaluated from the audio.
  string transcript = 6;
  // List of rule IDs that matched the transcript in evaluation.
  repeated string evaluation_decisions = 7;
}
