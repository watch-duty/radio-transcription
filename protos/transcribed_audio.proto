syntax = "proto3";
import "google/protobuf/timestamp.proto";

// Represents a processed audio transmission, including its metadata, source segment IDs, and the resulting transcript.
message TranscribedAudio {

  string transmission_id = 1;
    // List of unique IDs for the audio segments that make up this transmission.
  repeated string source_chunk_ids = 2;
    // Unique ID of the feed.
  string feed_id = 3;
    // Start timestamp of the audio.
  google.protobuf.Timestamp start_timestamp = 4;
    // End timestamp of the audio.
  google.protobuf.Timestamp end_timestamp = 5;
    // Full transcript text evaluated from the audio.
  string transcript = 6;
    // Indicates this transmission was prematurely split from its predecessor due to missing audio chunks.
  bool missing_prior_context = 7;
    // The unique ID of the audio segment where this transmission started.
  string start_source_chunk_id = 8;
    // The unique ID of the audio segment where this transmission ended.
  string end_source_chunk_id = 9;
}
