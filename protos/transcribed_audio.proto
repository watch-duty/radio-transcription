syntax = "proto3";

// Represents a processed audio transmission, including its metadata, source segment IDs, and the resulting transcript.
message TranscribedAudio {
    // Replicated google/protobuf/timestamp.proto.
    // Rationale: Deployed schema registries (e.g. Pub/Sub, Kafka, BigQuery) often require schemas
    // to be uploaded as a single, flat string. They do not have access to standard google proto library
    // paths and cannot resolve `import` statements. Therefore, this schema must remain 100% self-contained.
  message Timestamp {
    int64 seconds = 1;
    int32 nanos   = 2;
  }

  string transmission_id = 1;
    // List of unique IDs for the audio segments that make up this transmission.
  repeated string source_chunk_ids = 2;
    // Unique ID of the feed.
  string feed_id = 3;
    // Start timestamp of the audio.
  Timestamp start_timestamp = 4;
    // End timestamp of the audio.
  Timestamp end_timestamp = 5;
    // Full transcript text evaluated from the audio.
  string transcript = 6;
    // The relative start second of the transmission.
  float start_sec = 7;
    // The relative end second of the transmission.
  float end_sec = 8;
}
