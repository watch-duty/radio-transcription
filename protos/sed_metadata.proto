syntax = "proto3";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// Represents the SED (Speech Event Detection) metadata for an audio chunk.
message SedMetadata {
  // The unique identifier for the source audio chunk (e.g., UUID from the source filename).
  string source_chunk_id = 1;

  // A collection of segments where sound was identified.
  repeated SoundEvent sound_events = 2;

  // The absolute wall-clock time when this chunk started recording.
  google.protobuf.Timestamp start_timestamp = 3;
}

// Defines a specific time range where sound is present.
message SoundEvent {
  // Time from the beginning of the chunk where sound starts.
  google.protobuf.Duration start_time = 1;

  // How long the sound lasted.
  google.protobuf.Duration duration = 2;
}
